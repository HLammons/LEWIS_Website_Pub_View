<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMILab Login</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="wrapper">
        <div id="sidebar" class="sidebar">
            <img src="/static/images/SMILab_logo.png" alt="SMILab logo">
            <img src="/static/images/unm_civil_logo.png" alt="UNM civil engineering logo">
        </div>        
        <div class="container">
            <div id="login-content" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
                <div class="card" style="width: 400px; background-color: #2c3e50; border: none;">
                    <div class="card-body">
                        <h2 class="card-title text-center mb-4" style="color: white;">SMILab Login</h2>
                            <form id="loginForm" action="/login" method="POST">
                                <div class="form-group">
                                    <label for="username" style="color: white;">Username</label>
                                    <input type="text" class="form-control" id="username" name="username" required maxlength="10">
                                </div>
                                <div class="form-group">
                                    <label for="password" style="color: white;">Password</label>
                                    <input type="password" class="form-control" id="password" name="password" required maxlength="10">
                                </div>
                                <button type="submit" class="btn btn-primary btn-block">Login</button>
                            </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
